name: Start Azure Backend

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  
jobs:
  start-app:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_454613A42ECC4648B1E9B560C0743C19 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C9C05C3371B14076A885426C4558593F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B99916F7BC46457DB12A6761917D6C28 }}

      - name: Start App Service
        run: |
          az webapp start \
          --name tripgo-backend \
          --resource-group tripgo_recursos
